# TrustSOC — Filebeat HTTP Output Configuration
# ===============================================
# Forward Elastic/Filebeat events to TrustSOC for enrichment, correlation, and response.
#
# Add this to your filebeat.yml (typically /etc/filebeat/filebeat.yml)
# Then restart: sudo systemctl restart filebeat

# ---------------------------------------------------------------------------
# Option A: HTTP Output (Filebeat → TrustSOC directly)
# Use this when Filebeat is your primary log shipper.
# ---------------------------------------------------------------------------

output.http:
  # Replace with your TrustSOC URL
  hosts: ["https://YOUR_TRUSTSOC_URL"]
  path: "/api/v1/alerts"
  headers:
    x-api-key: "YOUR_TRUSTSOC_API_KEY"
    Content-Type: "application/json"
  # Wrap each event as a TrustSOC alert payload
  codec.format:
    string: >-
      {"source_system": "elastic", "external_id": "%{[event][id]}", "alert_data": %{[@metadata][beat]}}

